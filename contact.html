<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | StudyBuddy AI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="navbar"></div>
    <section class="section container reveal" style="padding: 120px 0;">
        <h2 style="text-align: center; margin-bottom: 40px;">Get in Touch</h2>
        <form class="card" style="max-width: 600px; margin: auto; display: flex; flex-direction: column; gap: 20px;">
            <input type="text" placeholder="Your Name" style="padding: 15px; background: var(--glass); border: 1px solid var(--border); color: white; border-radius: 10px;">
            <input type="email" placeholder="Email Address" style="padding: 15px; background: var(--glass); border: 1px solid var(--border); color: white; border-radius: 10px;">
            <textarea placeholder="How can we help?" style="padding: 15px; background: var(--glass); border: 1px solid var(--border); color: white; border-radius: 10px; min-height: 150px;"></textarea>
            <button class="btn-primary">Send Message</button>
        </form>
    </section>
    <div id="footer"></div>
    <script src="app.js"></script>
</body>
</html>
