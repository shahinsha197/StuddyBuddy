<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyBuddy AI | Home</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="navbar"></div>

    <section class="hero container reveal" style="display: flex; align-items: center; padding: 120px 0;">
        <div style="flex: 1;">
            <h1 style="font-size: 4rem; margin-bottom: 1.5rem;">Level Up Your <br> <span style="color: var(--accent);">Knowledge.</span></h1>
            <p style="font-size: 1.25rem; color: var(--text-muted); margin-bottom: 2rem;">Personalized AI tutoring that adapts to your learning style.</p>
            <button class="btn-primary">Start Learning Free</button>
        </div>
        <div style="flex: 1; display: flex; justify-content: center;">
            <img src="images/ai.png" alt="AI Tutor" class="hero-img">
        </div>
    </section>

    <section class="container reveal" style="padding: 100px 0;">
        <h2 style="text-align: center; margin-bottom: 4rem; font-size: 2.5rem;">Features</h2>
        <div id="featuresGrid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px;">
            </div>
    </section>

    <div id="footer"></div>
    <script src="app.js"></script>
</body>
</html>
