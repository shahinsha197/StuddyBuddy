<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | StudyBuddy AI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="display: grid; grid-template-columns: 280px 1fr; height: 100vh;">
    
    <aside style="background: var(--glass); border-right: 1px solid var(--glass-border); padding: 40px;">
        <h2 style="margin-bottom: 40px;">StudyBuddy</h2>
        <nav style="display: flex; flex-direction: column; gap: 15px;">
            <a href="index.html" class="card" style="padding: 15px; text-decoration: none; color: white;">Home</a>
            <a href="#" class="card" style="padding: 15px; text-decoration: none; color: white; border-color: var(--primary);">Dashboard</a>
        </nav>
    </aside>

    <main style="padding: 60px; overflow-y: auto;">
        <h1 style="margin-bottom: 40px;">Learning Overview</h1>
        
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-bottom: 40px;">
            <div class="card"><h3>12</h3><p>Sessions</p></div>
            <div class="card"><h3>5h</h3><p>Time Spent</p></div>
            <div class="card"><h3>8</h3><p>Topics</p></div>
        </div>

        <div class="card" style="min-height: 400px; display: flex; flex-direction: column;">
            <h3>AI Tutor</h3>
            <div id="chatMessages" style="flex: 1; margin: 20px 0; border-top: 1px solid var(--glass-border); padding-top: 20px;">
                <p>🤖 Hello! What would you like to master today?</p>
            </div>
            <div style="display: flex; gap: 10px;">
                <input type="text" style="flex: 1; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 10px; padding: 15px; color: white;">
                <button class="btn-primary" style="padding: 10px 25px;">Send</button>
            </div>
        </div>
    </main>

</body>
</html>
