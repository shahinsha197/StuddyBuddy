<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | StudyBuddy AI</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.5s ease;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 15px;
            color: white;
            outline: none;
            transition: var(--transition);
            box-sizing: border-box;
        }

        .form-group input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.07);
        }

        /* Success State */
        .success-content {
            display: none; /* Hidden by default */
            flex-direction: column;
            align-items: center;
        }

        .success-icon {
            width: 100px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px var(--accent));
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-card" id="loginCard">
        <div id="loginContent">
            <h2 style="font-size: 2rem; margin-bottom: 10px;">Welcome Back</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Resume your learning session</p>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="Enter email" required>
                </div>

                <div class="form-group" style="margin-bottom: 10px;">
                    <label>Password</label>
                    <input type="password" placeholder="Enter password" required>
                </div>

                <div style="text-align: right; margin-bottom: 25px;">
                    <a href="#" style="color: var(--accent); font-size: 13px; text-decoration: none;">Forgot Password?</a>
                </div>

                <button type="submit" class="button-17" style="width: 100%;">
                    Log In
                </button>
            </form>

            <p style="margin-top: 25px; font-size: 14px; color: var(--text-muted);">
                New here? <a href="register.html" style="color: var(--accent); text-decoration: none;">Create account</a>
            </p>
        </div>

        <div id="successContent" class="success-content">
            <img src="https://img.icons8.com/fluency/200/checked.png" class="success-icon" alt="Success">
            <h2 style="color: var(--accent);">Login Successful!</h2>
            <p style="color: var(--text-muted);">Redirecting to your dashboard...</p>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        
        const loginContent = document.getElementById('loginContent');
        const successContent = document.getElementById('successContent');
        const card = document.getElementById('loginCard');

        // Play "Success" transition
        loginContent.style.opacity = "0";
        setTimeout(() => {
            loginContent.style.display = "none";
            successContent.style.display = "flex";
            card.style.borderColor = "var(--accent)";
            
            // Redirect after 2 seconds
            setTimeout(() => {
                window.location.href = "index.html";
            }, 2000);
        }, 300);
    });
</script>

</body>
</html>
