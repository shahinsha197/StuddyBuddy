<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | StudyBuddy AI</title>
    <link rel="stylesheet" href="styles.css">
    <script>document.documentElement.classList.add('js-enabled');</script>
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">

<div class="container" style="max-width: 450px;">
    <div class="card reveal visible" style="text-align: center;">
        <div class="logo" style="font-size: 2rem; font-weight: 900; margin-bottom: 30px;">
            StudyBuddy <span style="color: var(--accent);">AI</span>
        </div>
        
        <h2 style="margin-bottom: 10px;">Create Account</h2>
        <p style="color: #9ca3af; margin-bottom: 30px;">Start your personalized learning path.</p>

        <div style="display: flex; flex-direction: column; gap: 15px; text-align: left;">
            <label style="font-size: 0.9rem; color: #9ca3af;">Full Name</label>
            <input type="text" id="name" placeholder="John Doe" 
                   style="padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; color: white;">

            <label style="font-size: 0.9rem; color: #9ca3af;">Email Address</label>
            <input type="email" id="email" placeholder="name@company.com" 
                   style="padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; color: white;">
            
            <label style="font-size: 0.9rem; color: #9ca3af;">Password</label>
            <input type="password" id="password" placeholder="Create a password" 
                   style="padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; color: white;">
        </div>

        <button onclick="register()" class="btn-glow" style="width: 100%; margin-top: 30px; padding: 15px;">
            Create Account
        </button>

        <p style="margin-top: 25px; color: #9ca3af; font-size: 0.9rem;">
            Already have an account? <a href="login.html" style="color: var(--accent); text-decoration: none;">Login</a>
        </p>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="auth.js"></script>

</body>
</html>
