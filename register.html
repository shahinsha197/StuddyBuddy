<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join StudyBuddy AI</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Specific styles for the Registration Page */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 15px;
            color: white;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: var(--transition);
            box-sizing: border-box;
        }

        .form-group input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            transition: var(--transition);
        }

        .back-link:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <h2 style="font-size: 2rem; margin-bottom: 10px;">Create Account</h2>
        <p style="color: var(--text-muted); margin-bottom: 30px;">Start your journey with <span class="accent-text">StudyBuddy</span></p>

        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="john@example.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="button-17" style="width: 100%; margin-top: 10px;">
                Create Free Account
            </button>
        </form>

        <a href="index.html" class="back-link">← Back to home</a>
    </div>
</div>

<script>
    // Simple feedback when they "register"
    document.getElementById('registerForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.innerText = "Setting up your tutor...";
        btn.style.opacity = "0.7";
        
        setTimeout(() => {
            alert("Welcome to StudyBuddy! Your AI environment is ready.");
            window.location.href = "index.html";
        }, 1500);
    });
</script>

</body>
</html>
